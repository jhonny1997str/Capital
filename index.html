<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Registro de Créditos - Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="login-container" class="login-container">
    <h1>🔒 Acceso a Créditos</h1>
    <input type="text" id="username" placeholder="Usuario">
    <input type="password" id="password" placeholder="Contraseña">
    <button id="btnLogin">Ingresar</button>
    <p id="login-error" style="color:red; display:none;">Usuario o contraseña incorrectos</p>
  </div>

  <div id="app-container" class="container" style="display:none;">
    <div class="header-flex">
        <h1>📊 Registro de Créditos</h1>
        <div style="display: flex; gap: 10px;">
            <button id="btnVerResumen">📈 Ver Resumen Financiero</button>
            <a href="cuotas-mensuales.html" style="padding: 10px 15px; background-color: #3498db; color: white; border: none; border-radius: 5px; cursor: pointer; text-decoration: none; font-size: 14px;">📅 Cuotas del Mes</a>
        </div>
    </div>

    <div id="resumen-container" style="display:none;">
        <div class="grid-resumen">
            <div class="card-resumen">
                <h3 style="margin-top:0; color: #2c3e50;">Estado de Inversión</h3>
                <table>
                    <tbody id="resumen-table-body"></tbody>
                </table>
            </div>
            <div id="indicators-col-main"></div>
        </div>
        <hr style="margin: 20px 0; border: 0; border-top: 1px solid #eee;">
    </div>

    <table id="tabla-creditos">
      <thead>
        <tr>
          <th>N° Crédito</th>
          <th>Marca temporal</th>
          <th>Fecha de crédito</th>
          <th>Cliente</th>
          <th>Monto prestado</th>
          <th>Modalidad</th>
          <th>Estado</th>
          <th>⚠️</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

  <div id="modal" class="modal">
    <div class="modal-content">
      <span id="cerrar">&times;</span>
      <div id="detalle"></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>

  <script src="app.js"></script>

</body>
</html>
